# Port for this service
server.port=8083

# Service Name for Eureka
spring.application.name=RESULT-SERVICE

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/exam_result_db
spring.datasource.username=root
spring.datasource.password=Jayambe@11
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Eureka Client Settings
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true
# Give Eureka a few seconds to sync
spring.cloud.loadbalancer.ribbon.enabled=false